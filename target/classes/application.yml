server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auction_master?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  file:
    name: F:/zijie/rizhi/auction-backend.log
  level:
    com.auction: debug
    org.springframework.web: debug
    com.baomidou.mybatisplus: debug
