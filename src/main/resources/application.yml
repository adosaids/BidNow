server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auction_master?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_general_ci
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-handlers-package: com.baomidou.mybatisplus.extension.handlers
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

aliyun:
  live:
    access-key-id: 你的AccessKey ID
    access-key-secret: 你的AccessKey Secret
    push-domain: push.your-domain.com
    play-domain: play.your-domain.com
    app-name: live

logging:
  file:
    name: F:/zijie/rizhi/auction-backend.log
  level:
    com.auction: debug
    org.springframework.web: debug
    com.baomidou.mybatisplus: debug
